name: Build Dragon APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython wheel 

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # تنظيف أي محاولة بناء قديمة فاشلة
          buildozer android clean
          # البدء ببناء APK جديد (Debug)
          buildozer android debug
