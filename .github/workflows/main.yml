name: Build Dragon APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools libffi-dev libssl-dev cmake
          pip3 install --user --upgrade buildozer cython wheel 

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          # السطر ده هينظف أي مسارات غلط قديمة
          buildozer android clean
          # السطر ده هيبني الـ APK ويطلع لنا التفاصيل لو فشل
          buildozer -v android debug
